<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List - Application</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="todo-wrapper">
            <h1>📝 Ma Liste de Tâches</h1>
            
            <div class="input-container">
                <input 
                    type="text" 
                    id="todoInput" 
                    placeholder="Ajouter une nouvelle tâche..."
                    class="todo-input"
                >
                <button id="addBtn" class="add-btn">➕ Ajouter</button>
            </div>

            <div class="filters">
                <button class="filter-btn active" data-filter="all">Toutes</button>
                <button class="filter-btn" data-filter="active">En cours</button>
                <button class="filter-btn" data-filter="completed">Complétées</button>
            </div>

            <ul id="todoList" class="todo-list"></ul>

            <div class="stats">
                <span id="totalTodos">Total: 0</span>
                <span id="completedTodos">Complétées: 0</span>
                <button id="clearBtn" class="clear-btn">🗑️ Effacer tout</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
