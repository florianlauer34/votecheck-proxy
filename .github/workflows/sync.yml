name: 🔄 Sync stats NosDéputés.fr

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: 📥 Fetch et sauvegarde stats
        run: |
          mkdir -p data
          node --input-type=module << 'EOF'
            import fs from 'fs';
            
            const SLUGS = ['marine-le-pen','gabriel-attal','edouard-philippe','jean-luc-melenchon','eric-ciotti','sandrine-rousseau'];
            const IDS   = ['mlp','ga','ep','jlm','ec','sr'];
            
            const results = {};
            for (let i = 0; i < SLUGS.length; i++) {
              const slug = SLUGS[i], id = IDS[i];
              console.log('Fetching ' + slug + '...');
              try {
                const r = await fetch('https://www.nosdeputes.fr/' + slug + '/json', {
                  headers: { 'User-Agent': 'Mozilla/5.0' },
                  signal: AbortSignal.timeout(12000),
                });
                console.log('  HTTP STATUS: ' + r.status);
                const text = await r.text();
                console.log('  RESPONSE (100 chars): ' + text.slice(0, 100));
                if (r.ok) {
                  const { depute: d } = JSON.parse(text);
                  const t = d?.top || {};
                  results[id] = {
                    profil: { semaines_presence: t.semaines_presence??null, interventions: t.hemicycle_interventions??null, amendements_proposes: t.amendements_proposes??null, questions_ecrites: t.questions_ecrites??null, groupe: d?.groupe_sigle??null, ancien: !!d?.ancien_depute },
                    votes: [],
                    fetched_at: new Date().toISOString()
                  };
                  console.log('  OK - groupe: ' + results[id].profil.groupe);
                } else {
                  results[id] = { profil: null, votes: [], error: 'HTTP ' + r.status };
                }
              } catch(e) {
                console.error('  ERREUR: ' + e.message);
                results[id] = { profil: null, votes: [], error: e.message };
              }
            }

fs.mkdirSync('data', { recursive: true });
fs.writeFileSync('data/stats.json', JSON.stringify({ last_sync: new Date().toISOString(), candidates: results }, null, 2));
console.log('stats.json OK');

      - name: 💾 Commit si changements
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stats.json
          if ! git diff --staged --quiet; then
            git commit -m "🔄 Stats — $(date +'%d/%m/%Y')"
            git push
          else
            echo "Rien a commiter."
          fi
