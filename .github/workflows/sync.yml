name: 🔄 Sync stats NosDéputés.fr

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch stats
        run: python3 scripts/fetch.py

      - name: Commit si changements
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stats.json
          if ! git diff --staged --quiet; then
            git commit -m "Stats $(date +'%d/%m/%Y')"
            git push
          fi
