# .github/workflows/sync.yml
name: 🔄 Sync stats NosDéputés.fr

on:
  schedule:
    - cron: '0 6 * * *'   # tous les jours à 6h UTC
  workflow_dispatch:       # bouton manuel dans l'onglet Actions

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # pour commiter data/stats.json

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📥 Fetch stats NosDéputés.fr
        run: node scripts/fetch-stats.mjs

      - name: 💾 Commit & push si changements
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stats.json
          if git diff --staged --quiet; then
            echo "Aucun changement, rien à commiter."
          else
            git commit -m "🔄 Stats candidats — $(date +'%d/%m/%Y %H:%M')"
            git push
          fi
